name: Security

on:
  pull_request:
  push:
    branches: [ main, staging ]
  schedule:
    # Weekly scan on Monday at 03:00 UTC — catches new CVEs between pushes
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF results to the Security tab
  pull-requests: write     # required to post PR summary comment

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analysis (Java)
    runs-on: ubuntu-latest

    # Skip when explicitly disabled or when running under act (no SARIF upload support)
    if: ${{ vars.ENABLE_CODEQL != 'false' && github.actor != 'nektos/act' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: ./.github/actions/setup-java-gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # Use the extended security-and-quality query suite for broader coverage.
          # Switch to 'security-extended' if build times become a concern.
          queries: security-and-quality

      - name: Build (CodeQL autobuild)
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
          output: sarif-results

      - name: Post CodeQL summary to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SARIF_FILE=$(find sarif-results -name '*.sarif' -print -quit 2>/dev/null || true)
          if [[ -z "$SARIF_FILE" ]]; then exit 0; fi
          COUNT=$(jq '[ .runs[].results // [] | .[] ] | length' "$SARIF_FILE")
          if [[ "$COUNT" -eq 0 ]]; then
            BODY="<!-- codeql-pr-summary -->
          ✅ **CodeQL**: no issues found."
          else
            BODY="<!-- codeql-pr-summary -->
          ⚠️ **CodeQL**: found **${COUNT}** issue(s). [View in Security tab](https://github.com/${{ github.repository }}/security/code-scanning)"
          fi
          PR_NUMBER="${{ github.event.pull_request.number }}"
          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- codeql-pr-summary -->")) | .id' | head -1)
          if [[ -n "$EXISTING_ID" ]]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              --method PATCH --field body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
