name: Publish

# Publishes Docker image and Helm chart to GHCR on every vX.Y.Z tag push.
# Kept separate from release.yml to avoid needs-chain skip issues — when
# triggered by a tag push, release.yml's release job is skipped, which
# caused the publish job inside release.yml to be skipped as well.

on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  # ── Docker ──────────────────────────────────────────────────────────────────
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    if: >-
      github.repository == vars.CANONICAL_REPOSITORY &&
      vars.PUBLISH_DOCKER_IMAGE == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stable  v1.2.3          → 1.2.3, 1.2, 1, latest
      # Canary  v1.2.3-canary.1 → 1.2.3-canary.1, canary
      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=canary,enable=${{ contains(github.ref, '-canary') }}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm ────────────────────────────────────────────────────────────────────
  helm:
    name: Publish Helm chart
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    if: >-
      github.repository == vars.CANONICAL_REPOSITORY &&
      vars.PUBLISH_HELM_CHART == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to GHCR
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Publish Helm chart
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "ref_name : ${{ github.ref_name }}"
          echo "VERSION  : $VERSION"
          CHART_NAME="$(helm show chart helm/app | grep '^name:' | awk '{print $2}')"
          echo "CHART_NAME: $CHART_NAME"
          helm package helm/app \
            --version "$VERSION" \
            --app-version "$VERSION"
          echo "Package created: ${CHART_NAME}-${VERSION}.tgz"
          helm push "${CHART_NAME}-${VERSION}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts
          echo "Push complete"
